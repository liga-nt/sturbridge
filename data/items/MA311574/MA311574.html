	// VariableFactory has two purposes:
	// 1.  Manage global variable state when we leave an item, and

	VariableFactory: {
		
		globalVars: {
			odVars:[],
			opBehaviors:[],
			responses : null,
		
			setGlobalVars: function(currentSection, currentItem, data) {
				// loop through all opBehaviors
				for (var i=0; i<this.opBehaviors.length; i++) {
					if (this.opBehaviors[i].behavior == 'setoutcomeval') {
						
						//console.log('found a setoutcomeval for: ' + this.opBehaviors[i].variableIdentifier);
						
						// is there a section filter that matches currentSection?
						if (this.opBehaviors[i].sectionIdentifier != '') {
							if (this.opBehaviors[i].sectionIdentifier != currentSection.attr.id) {
								continue; // skip
							}
						}
						// is there an includeCat filter that matches currentItem "is" property?
						if (this.opBehaviors[i].includeCat != '') {
							if (this.opBehaviors[i].includeCat != currentItem.attr.is) {
								continue; // skip
							}
						}
						// is there an excludeCat filter that matches currentItem "is" property?
						if ((this.opBehaviors[i].includeCat == '') && (this.opBehaviors[i].excludeCat != '')) {
							if (this.opBehaviors[i].excludeCat == currentItem.attr.is) {
								continue; // skip
							}
						}					
						
						// found a possible setOutcomeVal behavior
						// loop through all of the item's response vars - looking for 
						// an identifier match
						for (var j=0; j<data.length; j++) {
							if (this.opBehaviors[i].variableIdentifier == data[j].identifier) {
								//console.log('setoutcomevalue hit:' + this.opBehaviors[i].variableIdentifier);
								this.setVar(this.opBehaviors[i].identifier, data[j].value);
								break; // break out of inner loop
							}
						}
					}
				}
			},
			setGlobalResponseVar: function(data) {
				      this.responses = data;
			},
			getResponseVar: function() {
				      if (this.response != null) {
				          return this.response;
				       }
				      return null;
			},
			setVar: function(identifier, value) {
				for (var v in this.odVars) {
					myvar = this.odVars[v];
					if (myvar.identifier == identifier) {
						myvar.value = value;
						return true;
					}
				}
				return false;
			},
			
			getVar: function(identifier) {
				for (var v in this.odVars) {
					myvar = this.odVars[v];
					if (myvar.identifier == identifier) {
						return myvar.value;
					}
				}
				return null;
			},
			
			initNullOdValues: function() {
				for (var v in this.odVars) {
					myvar = this.odVars[v];
					// set the value prop to null if there is no value prop
					if (!myvar.hasOwnProperty('value')) {
						myvar.value = null;
					}
				}				
			}
			
		},	// end globalVars
		
		templateVars: {
			tdVars:[],
			tplBehaviors:[],
			
			loadVar:function(tdVar) {
				this.tdVars.push(tdVar);
			},
			
			loadBehavior:function(behavior) {
				this.tplBehaviors.push(behavior);
			},
			
			reset:function() {
				this.tdVars.splice(0, this.tdVars.length);
				this.tplBehaviors.splice(0, this.tplBehaviors.length);
			},
			
			getBehaviorByIdentifier:function(behaviorName, responseIdentifier) {
				var result=null,
					myb;
				for (var b in this.tplBehaviors) {
					myb = this.tplBehaviors[b];
					if (myb.behavior == behaviorName) {

							result = myb;

				}
				return result;
			},

				var globalValue = null;

			setVar: function(identifier, value) {
				for (var v in this.tdVars) {
					myvar = this.tdVars[v];
					if (myvar.identifier == identifier) {

    removeMathNamespacePrefix: function () {
        let childElements = [];

        // Find all <math> HTML elements with namespace prefix
        let mathElements = $('#itemCanvasBody').find('*').filter((i, node) =>
            node.nodeName.toLowerCase().endsWith(":math")
        );

        // Get all child elements in <math> with namespace prefix
        mathElements.each((i, elem) => {
            let elements = $(elem).find('*').filter((i, node) => node.nodeName.includes(':'));
            $.merge(childElements, elements);
        });

        $.merge(mathElements, childElements);

        // Remove namespace prefix from tags and preserve tag attributes
        mathElements.each((i, elem) => {
            let tagName = elem.nodeName.split(':').pop().toLowerCase();
            let tagAttributes = {};

            $.each(elem.attributes, (i, attr) => tagAttributes[attr.nodeName] = attr.nodeValue);
			$(elem).replaceWith(() => {
				const newEl = document.createElement(tagName);
				for(let key in tagAttributes) {
					newEl.setAttribute(key, tagAttributes[key]);
				}
				return $(newEl).append($(elem).contents());
			});
        });
    },

        $(document).off('TTSDOMReady').on('TTSDOMReady', function (evt, data) {
            if (data !== 'PreventTTSInitByInjectedScripts') {
                loading.modal('hide');
                loading.header.text('Loading, please wait...');
            }

            // Notify Readable and other things know that the item is loaded.
            $(document).trigger('ItemController.ItemLoaded');

            console.log('Received catalogCardsReady Event');
            $(document).trigger('TTSDOMReady', 'ButThereIsNoTTS'); 
        });
        
        // 4. Load TTS after all tool state has been loaded
        //    But first, test APIP for validity and display an error if not
        TN8.apip.valid = TN8.apip.hasValidTTS(TN8.apip.apipObject);

        // no tool state in API item show
        $(document).off('AccommodationSetStateDone').on('AccommodationSetStateDone', function () {

                // TN8.12 - if DynamicTTS is turned on, load it instead of initializing the TextToSpeechAPI.
                if (itemTools.hasDynamicTTSTool() || TN8.PnpController.checkDynamicTTSEnabled()) {                    
                    TN8.PnpController.setDynamicTTSEnabled(true);

                    loading.header.text('Loading TTS, please wait...');

                console.log('Found catalogInfo.  Loading CatalogController.');

            } else {
                $(document).trigger('TTSDOMReady', 'ButThereIsNoTTS');

        // 3.5. Load tool state after toolbar is displayed

            $(document).trigger('AccommodationSetStateDone');

        // 3. Load tools after MathJax is ready

            browserDetection.fixSafariMathJaxLayout();
			app.restoreState();
                                    $(document).trigger('ToolControllerInitialized');
                    });

        // 2. Load MathJax
		if ($('body').find('math').length > 0) {
		      loading.header.text("Loading MathJax, please wait...");   
		  }
		  app.mathjaxLoader.load();

	itemVariantChanged: function (evt, data) {
		loading.modal('show');
		//saving state of item after PNP changes
		app.saveState();
		
		// data param is an object containing the requested variant.
		// The empty string is the default variant; i.e., flavor 1
		var variant = (data.hasOwnProperty('variant') ? data.variant : '');

		// Essential: Reset ToolsController so that Flavor loading will trigger ToolControllerInitialized event
		app.cleanupTools();
		$("#selectedFlavour").val(variant);
		// If a CatalogController is currently instantiated, destroy it and all of its bindings.
		if (TN8.CatalogController != null) TN8.CatalogController.destroy();

		if (variant == 'es') {
			// Spanish or Spanish+English(SBAC) is flavor 2
			console.log('Retrieve variant (2)');
			app.loadItem(2);
		} else if (variant == 'os') {
			// Spanish only is flavor 3
			console.log('Retrieve variant (3)');
			app.loadItem(3);
		} else {
			// Everything else defaults to flavor 1
			console.log('Retrieve variant (1)');
			app.loadItem(1);
		}
	},

	// Utility function for starting DynamicTTS
	initDynamicTTS: function() {
		// If there is ASL defined for the item by APIP,
		// cancel out all of the other inclusion orders and call the TTS APIP library.
		// This will create the TTS toolbar.
		var isASL = TN8.apip && TN8.apip.apipObject && TN8.apip.isASL();
		if (isASL) {
			for (var order in TN8.apip.apipObject.inclusionOrder) {
				if (order !== "aslDefaultOrder") {
					TN8.apip.apipObject.inclusionOrder[order] = false;
				}
			}
			TN8.apip.ttsObject = TextToSpeechAPI.init(TN8.apip.apipObject);
		}
		
		// If there is ASL defined for the item by Catalog, the button should already exist.
		// If not, create the toolbar.		
		isASL = isASL || (TN8.apip && TN8.apip.apipObject && TN8.apip.apipObject.catalogInfo && $('#_tts_toolbar').length > 0);
		if (!isASL) {
			$('#tn8-sidebar').prepend(
				$('<div>', { id: '_tts_toolbar', css: { display: 'none' }})
			);
		}

		// Load (or reload) ContextMenu
		itemTools.addContextMenu(app);

		// Pass the toolbar element to dynamic TTS as the parent for appending buttons.
		SBTTSAPI.init({
			$el: $('#itemCanvasBody'),
			toolbarPadding: (isASL ? 2 : 0),
			$toolbarEl: $('#_tts_toolbar'),
			catalogSupport: TN8.CatalogController ? TN8.CatalogController.catalogInfoReader.getCardsBySupport('spoken') : []
		});		
	},

	// Turn off Dynamic TTS.
	cleanupDynamicTTS: function () {
		if (typeof SBTTSAPI != 'undefined') {
			SBTTSAPI.cleanup();
			// Remove context menu
			itemTools.destroyContextMenu();
		}
	},

				// poems do not have line breaks, so horizontal scrolling is helpful

	// This method is *only* for RTE and EE state-setting
	setEditorResponse: function(identifier, state) {
		
		var intState = null, 
			i, r, schema;

		// get out of here if there is no state for this item
		if (state == null) return;
		
		// Find the right response in the state array
		if (state.mods != undefined && state.mods.length > 0) {
		    for (i = 0; i < state.mods.length; i++) {
		        if (identifier == state.mods[i].did) {
		            intState = state.mods[i].r;
		            break;
		        }
		    }
		} else {
		    for (i = 0; i < state.length; i++) {
		        if (identifier == state[i].identifier) {
		            intState = state[i].value;
		            break;
		        }
		    }
		}

		if (intState == null) {
			$.jGrowl('Error: misalignment between saved response and interactions', {theme:'error'});
			return;
		} else {
			for (r in responseSchema) {
				schema = responseSchema[r];
				if ((schema.identifier == identifier) && (schema.interactionType == 'EXTENDEDTEXTINTERACTION')) {
					$('#interaction_' + schema.identifier).extendedtextInteraction('restoreState',intState);
					break;
				} else if ((schema.identifier == identifier) && (schema.interactionType == 'CUSTOMINTERACTION')) {
					if (schema.hasOwnProperty('subType')) {
						if (schema.subType == 'tei-ee') {
					    	if (intState != null) {
					    		eval('setResponseData_' + schema.identifier + '(intState)');
					    	}
							break;
						}
					}
				}
			}
		}
	},	// end setEditorResponse
	    
    bindExtendedTextAndChoice: function() {
    	for (var r in responseSchema) {
    		var response = responseSchema[r];
    		if (response.interactionType == 'EXTENDEDTEXTINTERACTION') {
    			// This only binds non-RTE extendedText interactions.  RTE extendedText is
    			// bound in the rtEditorReady callback because we need to ensure that the
    			// identifier's RTE is ready before binding the extendedTextInteraction
    			// widget to it.
				if (response.hasOwnProperty('subType')) {
					if (response.subType == '') {
    					$('#interaction_' + response.identifier).extendedtextInteraction({
    						identifier: response.identifier
    					});
    				} else {
    					// must be tei-rte, skip
    				}
				}
    		} else if (response.interactionType == 'CHOICEINTERACTION') {
    			if (response.cardinality == 'multiple') {
    				// only bind when there is no shadow interaction
    				var shadowUl = $('ul[data-identifier="' + response.identifier + '_shadow' + '"]');
    				if (shadowUl.length == 0) {
    					var ul = $('ul[data-identifier="interaction_' + response.identifier + '"]');
    					if (ul.length == 0) {
    						// some MC items do not have the "interaction_" prefix
    						ul = $('ul[data-identifier="' + response.identifier + '"]');
    					}
    					// bind to the li of the choice, not to the input element
    					$('li', ul).click(function(e) {
    						var parentUl = $(this).closest('ul'),
    							choice = $(this).find('input'),
    							max = parentUl.data('maxchoices'),
    							maxChoicesMessage = parentUl.data('maxchoices-message');

	        				if ((max !== undefined) && (max > 0)) {
    							var choices = $('input:checked', parentUl);
    							if (choices.length > max) {
    								$(choice).prop('checked', false);
	        						if (maxChoicesMessage != undefined) {
	        							$.jGrowl(maxChoicesMessage, {theme: 'warning'});	        							
	        						} else {
	        							var msg =  'You are permitted a maximum of ' + max + ' choice' + ((max > 1) ? 's' : '');
	        							$.jGrowl(msg + ' for this question.<br/><br/>Please unselect one of your choices before making another choice.', {theme: 'warning'});
	        						}
	        					}
	        				}
    						$(document).trigger('ItemResponseChanged');
	        			});
    				}

        		} else if (response.cardinality == 'single') {
    				// only bind when there is no shadow interaction
    				var shadowUl = $('ul[data-identifier="' + response.identifier + '_shadow' + '"]');
    				if (shadowUl.length == 0) {
    					var ul = $('ul[data-identifier="interaction_' + response.identifier + '"]');
    					if (ul.length == 0) {
    						// some MC items do not have the "interaction_" prefix
    						ul = $('ul[data-identifier="' + response.identifier + '"]');
    					}
    					// bind to the li of the choice, not to the input element
    					$('li', ul).click(function(e) {
    						$(document).trigger('ItemResponseChanged');
    					});
    				}
    			}
			} else if (response.interactionType == 'INLINECHOICEINTERACTION') {
				// check the old way
				var el = $('select[data-identifier="interaction_' + response.identifier + '"]');
				if (el.length === 0) {
					// Select via the new way
					el = $('select[data-identifier="' + response.identifier + '"]');
				}
				$(el).change(function(e) {
					$(document).trigger('ItemResponseChanged');
				});
			} else if (response.interactionType == 'TEXTENTRYINTERACTION') {
				// check the old way
				var el = $('input[data-identifier="interaction_' + response.identifier + '"]');
				if (el.length === 0) {
					// Select via the new way
					el = $('input[data-identifier="' + response.identifier + '"]');
				}
				if ($(el).data('module') != 'TextEntryGriddedResponse') {
					// Bind the non-widgeted textentry.  Gridded uses a widget.
					$(el).on('input', function(e) {
						$(document).trigger('ItemResponseChanged');
					});
				}
			}
		}
	},

		if ((interaction.interactionType == 'CUSTOMINTERACTION') && (interaction.subType == 'tei-pci')) {
			var config = qtiCustomInteractionContext.getConfigurationByIdentifier(interaction.identifier);
			
			if (config != null) {

	// Only call this after fetching any Asynch responses.
	getAllInteractionResponses: function(isGenerateJson) {
		var results = [],
			resultsXml = "",
			resultsJson = (isGenerateJson) ? '{"mods":[' : "",	
			first = true;

		if (typeof responseSchema === 'undefined') {
			if (isGenerateJson) {
				resultsJson += ']}';
				return ([results, resultsJson]);
			} else {
				return [results];
			}
		}

		for (var r in responseSchema) {
			var response = responseSchema[r];
			var isEE = false;
			if (response.interactionType == "ORDERINTERACTION") {
				var result = [];
				if ((response.subType == "tei-order") || (response.subType == "tei-order-match")) {
				result = eval("getResponseData_" + response.identifier + "()");
				} else {
					var choices = $("#interaction_" + response.identifier + " > li");
					for (var i=0; i<choices.length; i++) {
						result.push(choices.eq(i).attr("data-identifier") || choices[i].id);
					}
				}
				response.value = JSON.stringify(result);			
			} else if (response.interactionType == "GAPMATCHINTERACTION") {
				if(eval("typeof(getResponseData_" + response.identifier + ") == typeof(Function)")) {
			    	var result = eval("getResponseData_" + response.identifier + "()");		
					response.value = JSON.stringify(result);
				} else {			
					var result = [], pair, targetId;
					response.value = "[]";
					if (response.baseType == "directedPair") {
						$("span.gap").each(function(index) {
							targetId = $(this).attr("id");
							$("ul", $(this)).find("li").each(function(index) {
								pair = $(this).attr("id") + " " + targetId;
								result.push(pair);
							});
						});
						response.value = JSON.stringify(result);
					}
				}
			} else if (response.interactionType == "POSITIONOBJECTINTERACTION") {
				var result = [], point;
				$("#interaction_choices_" + response.identifier + " > div").each(function(index) {
					point = [$(this).data('pos').xpos, $(this).data('pos').ypos];
					result.push(point);
				});
				response.value = JSON.stringify(result);
			} else if (response.interactionType == "GRAPHICGAPMATCHINTERACTION") {
				var result = eval("getResponseData_" + response.identifier + "()");
				response.value = JSON.stringify(result);
			} else if (response.interactionType == "MATCHINTERACTION") {
				if(eval("typeof(getResponseData_" + response.identifier + ") == typeof(Function)")) {
			    	var result = eval("getResponseData_" + response.identifier + "()");		
					response.value = JSON.stringify(result);
				} else {
					var result = [], pair, targetId;
					response.value = "[]";
					if (response.baseType == "directedPair") {
						$("#interaction_targetchoices_" + response.identifier + " > li").each(function(index) {
							targetId = $(this).attr("id");
							$("ul", $(this)).find("li").each(function(index) {
								pair = $(this).attr("id") + " " + targetId;
								result.push(pair);
							});
						});
						response.value = JSON.stringify(result);
					}
				}
			} else if (response.interactionType == "DRAWINGINTERACTION") {
				var result = eval("getResponseData_" + response.identifier + "()");
				response.value = result;
			} else if ((response.interactionType == "CUSTOMINTERACTION") ||
				  	   (response.interactionType == "CUSTOMINTERACTION-CHART")) {
				var isGraphing = false;
				var isPointGraph = false;
				var isFunctionGraph = false;
				var isFractionModel = false;
				var isZoomNumberLine = false;
				var isNumberLine = false;
				var isTextExtractor = false;
				var isTextHighlighter = false;
				var isComplexHotspot = false;
				var isShapeTransform = false;
				var isCompositeGraph = false;
				var isComplexSlider = false;
				var isPCI = false;
				var isRichInline = false;
				var isAudioCapture = false;
				var isSbGrid = false;
				var isSbEE = false;
				var isSbTI = false;
	
				var result;
				response.value = "";
	
				if (response.hasOwnProperty("subType")) {
					if ((response.subType == "tei-pointgraph-line") ||
						(response.subType == "tei-pointgraph-polygon") ||
						(response.subType == "tei-pointgraph-scatter")) {
						isPointGraph = true;
					} else if (response.subType == "tei-functiongraph") {
						isFunctionGraph = true;
					} else if (response.subType == "tei-zoomnumberline") {
						isZoomNumberLine = true;
					} else if (response.subType == "tei-numberline") {
						isNumberLine = true;
					} else if (response.subType == "tei-fractionmodel") {
						isFractionModel = true;
					} else if (response.subType == "tei-textextractor") {
						isTextExtractor = true;
					} else if (response.subType == "tei-texthighlighter") {
						isTextHighlighter = true;
					} else if (response.subType == "tei-complexhotspot") {
						isComplexHotspot = true;
					} else if (response.subType == "tei-graphing") {
						isGraphing = true;
					} else if (response.subType == "tei-shapetransformation") {
						isShapeTransform = true;
					} else if (response.subType == "tei-compositegraph") {
						isCompositeGraph = true;
					} else if (response.subType == "tei-complexslider") {
						isComplexSlider = true;				
					} else if (response.subType == "tei-ee") {
						isEE = true;
					} else if (response.subType == "tei-pci" || response.subType == "tei-timer") {
						isPCI = true;
					} else if (response.subType == "tei-richinline") {
						isRichInline = true;
					} else if (response.subType == "tei-audiocapture") {
						isAudioCapture = true;
					} else if (response.subType == "tei-sbgrid") {
						isSbGrid = true;
					} else if (response.subType == "tei-sbee") {
						isSbEE = true;
					} else if (response.subType == "tei-sbti") {
						isSbTI = true;
					}
				}
							
				if ((isPointGraph) || (isGraphing) || (isTextHighlighter) || (isTextExtractor) || (isFractionModel) || (isNumberLine) || (isZoomNumberLine) || (isEE) || (isFunctionGraph) || (isShapeTransform) || (isCompositeGraph) || (isComplexSlider)) {
					result = eval("getResponseData_" + response.identifier + "()");
						response.value = JSON.stringify(result.data) + (isGenerateJson ? "" : "(answered = " + result.answered + ")");
				} else if ((isComplexHotspot) || (isRichInline)) {
					result = eval("getResponseData_" + response.identifier + "()");
					response.value = JSON.stringify(result);
				} else if (isAudioCapture) {
					result = eval("getResponseData_" + response.identifier + "()");
					if (result.hasOwnProperty("data")) {
						// v1 audio capture
						response.value = JSON.stringify(result.data) + (isGenerateJson ? "" : "(answered = " + result.answered + ")");
					} else {
						// v2 audio capture
						result = TN8.AudioFileFactory.getAudio(response.identifier)
						response.value = JSON.stringify(result) + (isGenerateJson ? "" : "(answered = " + result.answered + ")");
					}
				} else if (isSbEE || isSbGrid || isSbTI) {
					result = eval("getResponseData_" + response.identifier + "()");
					// These produce stringified XML in the data property
					response.value = result.data;
				} else if (isPCI) {
					var interaction = qtiCustomInteractionContext.getConfigurationByIdentifier(response.identifier);
					if (interaction != null) {
						var el = $('div[data-identifier="' + interaction.identifier + '"]');
						if (el.length > 0) {
							var isPciIframed = el.data( 'pciIframed' ) == true;
							if (isPciIframed) {
								// Get response from QTI_PCI_Platform. If the response is undefined, this means that
								// the PCI has not completed its initialization sequence (for whatever reason).
								response.value = ((typeof QTI_PCI_Platform.interactionResponses[response.identifier] != "undefined") ? JSON.stringify( QTI_PCI_Platform.interactionResponses[response.identifier] ) : null);
							} else {
								result = interaction.getResponse();
								if (result.hasOwnProperty("answered")) {
									// it is an interaction
									if (typeof result.data == "string") {
										if (isGenerateJson) response.value = '"' + result.data + '"';
										else response.value = result.data + "(answered = " + result.answered + ")";				
									} else {
										response.value = JSON.stringify(result.data) + (isGenerateJson ? "" : "(answered = " + result.answered + ")");				
									}
								} else {
									// it is a manipulative
									if (typeof result == "string") {
										if (isGenerateJson) response.value = '"' + result + '"';
										else response.value = result;
									} else {
										response.value = JSON.stringify(result);
									}
								}
							}
						} else {
							response.value = "[PCI Not Found(" + response.identifier + ")] (answered = undefined)";					
						}							
					} else {
						response.value = "[PCI Not Found(" + response.identifier + ")] (answered = undefined)";					
					}
				} else {
					response.value = "[Unexpected Interaction Type!] (answered = undefined)";
				}
			} else if (response.interactionType == "HOTSPOTINTERACTION") {
				var result = eval("getResponseData_" + response.identifier + "()");
				response.value = JSON.stringify(result);
			} else if (response.interactionType == "HOTTEXTINTERACTION") {
				var result = eval("getResponseData_" + response.identifier + "()");
				response.value = JSON.stringify(result.data) + (isGenerateJson ? "" : "(answered = " + result.answered + ")");
			} else if (response.interactionType == "CHOICEINTERACTION") {
				let result = [], i;
				const el = $("ul[data-identifier='" + response.identifier + "_shadow']"),
					el2 = $.makeArray($('ul')).filter((inst) => $(inst).parent('[data-identifier="' + response.identifier + '"]').length > 0);
				response.value = [];
				if (el.length > 0 || el2.length > 0) {
					// new shadow choice interaction needs to be saved with getResponseData
					result = eval('getResponseData_' + response.identifier + '()');
					if (!Array.isArray(result)) {
						result = [];
					}
				} else {
					var choices = $("input[name=group_" + response.identifier + "]:checked");
					if (response.cardinality == "single") {
						if (choices.length > 1) {
							$.jGrowl("Item Compiler Error.  For " + response.identifier + ", cardinality is SINGLE, but more than one selection was found.", {theme: 'error'});
						}
					}
				}
				for (i = 0; i < choices.length; i++)
				{ 
				  if (!$(choices[i]).attr("value")) {
					result.push($(choices[i]).attr("data-choice-value"));
				    }
				  else { 
					result.push($(choices[i]).attr("value")); 
					}
				}
				if (Array.isArray(response.value)) {
					response.value = JSON.stringify(result);
				} else {
					response.value = result;
				}
			} else if (response.interactionType == "INLINECHOICEINTERACTION") {
				var result = [];
				response.value = "[]";	
				// legacy inlineChoiceInteractions had an "interaction_" prefix on the id of the <select> 
				var choice = null;
				var selector = $("select[data-identifier='interaction_" + response.identifier + "']");
				if (selector.length > 0) {
					choice = $("select[data-identifier='interaction_" + response.identifier + "'] option").filter(":selected");			
				} else {
					choice = $("select[data-identifier='" + response.identifier + "'] option").filter(":selected");				
				}
				if (choice != null) {
					var val = $(choice).attr("value");
					if (val != "") {
						result.push(val);
					}
				}
				response.value = JSON.stringify(result);
			} else if (response.interactionType == "EXTENDEDTEXTINTERACTION") {
				var result, el, ed;
				el = $("div[data-identifier='" + response.identifier + "']");
				if (el.length) {
					// RTELite
				} else {
					el = $("div[data-identifier='interaction_" + response.identifier + "']");
				}
				if ($(el).attr("data-module") == "RTELiteInteraction") {
					ed = $('#interaction_' + response.identifier);
					result = ed.richText('getResponse');
					response.value = JSON.stringify(result);
				} else if ($(el).attr("data-module") == "RichTextInteraction") {
					ed = tinyMCE.EditorManager.get('interaction_'+response.identifier);
					result = { rawText: ed.getContent({format : 'text'}), richText: ed.getContent() };
					response.value = JSON.stringify(result);
				} else if ($(el).attr("data-module") == "CKEDITORInteraction") {
					ed = $('#interaction_' + response.identifier);
					result = ed.ckEditor('getResponseData');
					response.value = JSON.stringify(result);
				} else {
					//var content = '"' + $("#interaction_" + response.identifier).val() + '"';
					var content = $("#interaction_" + response.identifier).val();
					response.value = JSON.stringify(content);
				}
			} else if (response.interactionType == "TEXTENTRYINTERACTION") {
				// check old way
				var el = $('input[data-identifier="interaction_' + response.identifier + '"]');
				if (el.length > 0) {
					response.value = '"' + $(el).val() + '"';
				} else {
					// check new way
					el = $('input[data-identifier="' + response.identifier + '"]');
					if ($(el).data('module') == 'TextEntryGriddedResponse') {
						response.value = '"' + eval('getResponseData_' + response.identifier + '()') + '"';
					} else {
						response.value =  '"' + $(el).val() + '"';
					}
				}
			} else if (response.interactionType == "") {
				response = null;
			} else {
				response.value = '"' + $("#interaction_" + response.identifier).val() + '"';
			}
			if (response != null) {
				resultsXml = (typeof response.value === 'string' ? escapeXml(response.value) : response.value);
				resultsXml = resultsXml.replace(/\\\\n/g, '\\n');
				results += 'Variable ' + response.identifier + ' = ' + resultsXml + '<br />';
				resultsXml = '{"responses":[{"identifier":"' + response.identifier + '","baseType":"string","value":' + escapeJson(resultsXml) + '}]}';
			}
			if (isGenerateJson && (response != null)) {
				if (first) first = false;
				else resultsJson += ",";
				resultsJson += '{"did":"' + response.identifier + '","r":';
				resultsXml = (response.value.includes("<response>") || response.value.includes("<responseSpec>")| response.value.includes("<AnswerSet>"))
					? escapeJson(escapeXml(response.value)) : response.value;
				resultsJson += ((response.value.length == 0) ? '""' : resultsXml);
				// TN8.13 account for order interactions with answered property
				resultsJson += (response.interactionType == 'ORDERINTERACTION' && response.hasOwnProperty('answered')) ? ',"answered":' + response.answered + '' : '';
				resultsJson += '}';
			}
		}
		if (isGenerateJson) {
			resultsJson += ']}';
			return ([results, resultsJson]);
		} else return ([results, resultsXml]);
	},
	    	
	getAnswered: function(responses, stateIndex) {
		// Evaluate all interactions in an item to determine answered-ness.
		var answered = false;

		// It is possible that we can fire getAnswered before rsScriptReady, in which case 
		// responseSchema will be undefined.  In this case, bail.
		if (typeof responseSchema === 'undefined') return false;
				
		// There is no way to determine if item is web content without access to a testmap which we don't have.
		// But we do mark any items with no interactions as answered=true.

		if (responseSchema.length == 0) return true; // Items with no interactions are always answered.
		
		for (var r in responseSchema) {
			var intState = null;
			schema = responseSchema[r];

			for (index=0;index<responses.length;index++) {
				if (schema.identifier == responses[index].identifier) {
					intState = responses[index];
					break;
				}
			}
			if (intState == null) return false;

			if ((schema.interactionType == 'CHOICEINTERACTION') ||
				(schema.interactionType == 'INLINECHOICEINTERACTION')) {
				if (typeof intState.value !== "object") {
					intState.value = JSON.parse(intState.value);
				}
			    if (intState.value.length == 0 ) {
					 return false;
				 } else {
					if (schema.cardinality == 'multiple') {
						var ul = $('ul[data-identifier="interaction_' + schema.identifier + '"]'),
	        				min = ul.data('minchoices'),
	        				max = ul.data('maxchoices');
					 if (ul.length == 0) {
							var div = $('div[data-identifier="'+ schema.identifier + '"]'),
	        				min = div.data('minchoices'),
	        				max = div.data('maxchoices');
						}
    				  var choices = $('input[name=group_' + schema.identifier + ']'),myChoice, id;
						for(i=0; i<choices.length; i++) {
							myChoice = $(choices[i]);
							if (!myChoice.attr('value')) {
							  id= myChoice.attr("data-choice-value");
							}else{
							   id= myChoice.attr("value");
							}
							for(j=0; j<intState.value.length; j++) {
								
								if(intState.value[j] === id) {
									myChoice.attr('checked', true);
								}
								if(intState.identifier == schema.identifier && intState.value.length >= min)
								 {
									answered = true;
								 }
							}
							break;
						}
						if ((min == undefined) && (intState.value.length > 0)) {
							answered = true;
						} else if ((min > 0) && (intState.value.length >= min)) {
							answered = true;
						} else if ((min == 0) && (intState.value.length > 0)) {
							answered = true;
						} else {
							answered = false;
						}
					} else {
						// cardinality single and value.length > 0
						answered = true;
					}
				}
				if (!answered) return false;

			} else if (schema.interactionType == 'TEXTENTRYINTERACTION') {
				var el = $('input[data-identifier="' + schema.identifier + '"]');
				if ($(el).data('module') != 'TextEntryGriddedResponse') {
					answered = ($(el).val().length == 0) ? false : true;
				} else {
					// Gridded uses a widget
					answered = eval('interaction_' + schema.identifier + '.griddedResponse(\'getAnswered\')');
				}
				if (!answered) return false;

    		} else if (schema.interactionType == 'EXTENDEDTEXTINTERACTION') {
				if (schema.hasOwnProperty('subType')) {
					if (schema.subType == '') {
						// Plain ExtendedText
						var el = $('#interaction_' + schema.identifier);
						// ignore-answered is a class on the <textarea>
						if ($(el).hasClass('ignore-answered')) {
							answered = true;
						} else {
							answered = $(el).extendedtextInteraction('getAnswered');
						}
    				} else if (schema.subType == 'tei-rte') {
    					// Check the Module to determine which RTE
    					var el = $('div[data-identifier="' + schema.identifier + '"]');
    					if (el.data('module') == 'RTELiteInteraction') {
    						// ExtendedText with JET
    						var result = $('#interaction_' + schema.identifier).richText('getResponse');
    						answered = (result.rawText.length == 0) ? false : true;
    					} else {
    						// ExtendedText with Tiny Deprecated - Tiny places a linefeed (one char) in an empty response
							var ed = tinyMCE.EditorManager.get('interaction_' + schema.identifier);
							answered = (ed.getContent({format : 'text'}).length > 1) ? true : false;
						}
    				} else if (schema.subType == 'tei-ckeditor') {
    					var result = $('#interaction_' + schema.identifier).ckEditor('answered');
    					answered = result;
    				}
    			}
    			if (!answered) return false;

			} else if (schema.interactionType == 'HOTSPOTINTERACTION') {
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					answered = eval('interaction_' + schema.identifier + '.hotspotInteraction(\'getAnswered\')');
				}
				if (!answered) return false;

			} else if ((schema.interactionType == 'CUSTOMINTERACTION') && (schema.subType == "tei-complexhotspot")) {
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					answered = eval('interaction_' + schema.identifier + '.getAnswered()');
				}
				if (!answered) return false;

			} else if (schema.interactionType == 'HOTTEXTINTERACTION') {
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					answered = eval('interaction_' + schema.identifier + '.getAnswered()');
				}
				if (!answered) return false;

			} else if (schema.interactionType == 'MATCHINTERACTION') {
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					if ($(el).data('module') == 'MatchInteraction-tablegrid') {
						answered = eval('interaction_' + schema.identifier + '.matchgridInteraction("getAnswered")');
					} else {
						answered = $(el).matchInteraction('getAnswered');
					}
				}
				if (!answered) return false;

			} else if (schema.interactionType == 'GAPMATCHINTERACTION') {
				// With ungrouped GM the UL of the source choices contains the data-identifier
				var el = $('ul[data-identifier="' + schema.identifier + '"]');
				// With grouped GM the DIV around the groups contains the data-identifier
				if (el.length == 0) el = $('div[data-identifier="' + schema.identifier + '"]');
				
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					answered = $('#interaction_' + schema.identifier).gapmatchInteraction('getAnswered');
				}
				if (!answered) return false;

			} else if (schema.interactionType == 'GRAPHICGAPMATCHINTERACTION') {
				// With GGM the UL of the source choices contains the data-identifier
				var el = $('ul[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					answered = $('#interaction_' + schema.identifier).graphicgapmatchInteraction('getAnswered');
				}
				if (!answered) return false;

			} else if (schema.interactionType == 'ORDERINTERACTION') {
				if (schema.subType == 'tei-order') {
					answered = $('#interaction_' + schema.identifier).orderInteraction('getAnswered');
				}
				if (!answered) return false;

			} else if ((schema.interactionType == 'CUSTOMINTERACTION') && (schema.subType == 'tei-richinline')) {
				answered = $('select[data-identifier="' + schema.identifier + '"]').selectpicker('getAnswered');
				if (!answered) return false;

			} else if ((schema.interactionType == 'CUSTOMINTERACTION') && (schema.subType == 'tei-ee')) {
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					var ee = EquationEditorAPI.getInstance(schema.identifier);
					if (ee != null) answered = ee.getAnswered();
				}
				if (!answered) return false;

			} else if ((schema.interactionType == 'CUSTOMINTERACTION') &&
						((schema.subType == 'tei-pointgraph-line') ||
						 (schema.subType == 'tei-pointgraph-line') ||
						 (schema.subType == 'tei-pointgraph-polygon') ||
						 (schema.subType == 'tei-pointgraph-scatter') ||
						 (schema.subType == 'tei-functiongraph') ||
						 (schema.subType == 'tei-compositegraph') ||
						 (schema.subType == 'tei-texthighlighter') ||
						 (schema.subType == 'tei-textextractor') ||
						 (schema.subType == 'tei-numberline') ||
						 (schema.subType == 'tei-shapetransformation') ||
						 (schema.subType == 'tei-zoomnumberline') ||
						 (schema.subType == 'tei-fractionmodel'))) {
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					answered = eval('interaction_' + schema.identifier + '.getAnswered()');
				}
				if (!answered) return false;

			} else if ((schema.interactionType == 'CUSTOMINTERACTION') && (schema.subType == "tei-complexslider")) {
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					answered = $(el).complexsliderInteraction('getAnswered');
				}
				if (!answered) return false;

			} else if ((schema.interactionType == 'CUSTOMINTERACTION') && (schema.subType == "tei-sbgrid")) {
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					answered = $(el).sbgrid('getAnswered');
				}
				if (!answered) return false;
				
			} else if ((schema.interactionType == 'CUSTOMINTERACTION') && (schema.subType == "tei-sbee")) {
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					answered = $(el).sbee('getAnswered');
				}
				if (!answered) return false;

			} else if ((schema.interactionType == 'CUSTOMINTERACTION') && (schema.subType == "tei-graphing")) {
				// These are typically bar charts...using Highcharts instead of Pointgraph libs
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					// Once a barchart has been answered, it cannot be unanswered.
					// Examine test state to see if this was answered before.
					var ans = false;
					if (stateIndex != null) {
						ans = app.testState[stateIndex].answered ? true : $(el).barchartInteraction('getAnswered');
					} else {
						ans = $(el).barchartInteraction('getAnswered');
					}
					answered = (ans === true) ? true : false;
				}
				if (!answered) return false;

			} else if (schema.interactionType == 'DRAWINGINTERACTION') {
				var el = $('div[data-identifier="' + schema.identifier + '"]');
				if (app.ignoreAnswer(el)) {
					answered = true;
				} else {
					answered = $(el).drawingInteraction('getAnswered');
				}
				if (!answered) return false;

			} else if ((schema.interactionType == 'CUSTOMINTERACTION') && (schema.subType == "tei-pci" || schema.subType == "tei-timer")) {
				var interaction = qtiCustomInteractionContext.getConfigurationByIdentifier(schema.identifier);
				if (interaction != null) { // it is an interaction
					var el = $('div[data-identifier="' + schema.identifier + '"]');
			   		if (($(el).data('includeanswered') != undefined) && ($(el).data('includeanswered') === true) && interaction.getAnswered) {
						answered = interaction.getAnswered();
					} else {
						answered = true;
					}
				} else { // it is a manipulative
					answered = true;
				}
				if (!answered) return false;

			} else if ((schema.interactionType == 'CUSTOMINTERACTION') && (schema.subType == "tei-audiocapture")) {
				if (intState.value.hasOwnProperty('answered')) {
					answered = intState.value.answered;
				} else {
					// Bail - this is a deprecated audio capture interaction.
					answered = false;
				}
				if (!answered) return false;

			}
		}
		return answered;
	},

	updateAnsweredStatus: function(answered) {
		if (app.answeredBadge != null) {
			if (answered) {
				$(app.answeredBadge)
					.addClass('btn-success')
					.prop('title','Answered Status: Answered')
					.html('<i class="icon-ok-sign"></i>');
			} else {
				$(app.answeredBadge)
					.removeClass('btn-success')
					.prop('title','Answered Status: Not Answered')
					.html('<i class="icon-minus-sign"></i>');
			}
		}
	},

	// Evaluate the element for the data-ignoreanswered attribute
	ignoreAnswer: function(el) {
		if (el.length > 0) {
			if (($(el).data('ignoreanswered') != undefined) && ($(el).data('ignoreanswered') === true)) return true;
		}
		return false;
	},

		var el = $(badgeSelector);
		if (el.length) {
			$(el).removeClass('hidden');
			return el;

	 	              continue;
	 	          }

	 	                  intState = state[index];
	 	                  intState.value = state[index].value;

	 	              var el = $("select[data-identifier='interaction_" + schema.identifier + "']");

	 	                  el = $("select[data-identifier='" + schema.identifier + "']");
	 	              }

	 	                  if ($(el).data('module') == 'TextEntryGriddedResponse') {
	 	                      eval('setResponseData_' + schema.identifier + '(intState.value)');

	 	                      $(el).val(intState.value);

	 	          } else if ((schema.interactionType == 'HOTSPOTINTERACTION') ||
	 	              (schema.interactionType == 'GAPMATCHINTERACTION') ||
	 	              (schema.interactionType == 'GRAPHICGAPMATCHINTERACTION') ||
	 	              (schema.interactionType == 'MATCHINTERACTION') ||
	 	              (schema.interactionType == 'HOTSPOTINTERACTION') ||
	 	              (schema.interactionType == 'HOTTEXTINTERACTION') ||
	 	              (schema.interactionType == 'DRAWINGINTERACTION')) {
	 	              eval('setResponseData_' + schema.identifier + '(intState.value)');
	 	          } else if ((schema.interactionType == 'CUSTOMINTERACTION') ||
	 	              (schema.interactionType == 'CUSTOMINTERACTION-CHART')) {
	 	              if (schema.hasOwnProperty('subType')) {
	 	                  if ((schema.subType == 'tei-ee') || (schema.subType == 'tei-sbgrid')) {
	 	                      // skip it for now - set later on with setEditorResponse
	 	                  } else if (schema.subType == 'tei-pci' || schema.subType == 'tei-timer') {
	 	                      var pci = qtiCustomInteractionContext.getConfigurationByIdentifier(schema.identifier);
	 	                      if (pci != null) {

	 	                          if (el.length > 0) {

	 	          } else if (schema.interactionType == 'ORDERINTERACTION') {

var itemBehaviors = {
	// Array of Behaviors for item.
	behaviors:[],
	applied:[],
	scrolled:false,

	load:function (behavior) {
		this.behaviors.push(behavior);
	},

	clear:function(clearApplied) {
		this.behaviors.splice(0, this.behaviors.length);
		this.scrolled = false;
		if (clearApplied) {
			this.applied.splice(0, this.applied.length);
		}
	},

	reapplyAll: function () {
		this.scrolled = false;
		this.applyAll(this.applied);
	},

	applyAll: function (behaviors) {
		var initial = false,
			myb;

		if (!behaviors) {
			behaviors = this.behaviors;
			initial = true;
		}

		for (var b in behaviors) {
			myb = behaviors[b].behavior;

			if (initial) this.applied.push(behaviors[b]);

			if((this.applied[b].id).length > 0){
				if (myb === "behavior-highlight") {
					this.highlight(behaviors[b].id);
				} else if (myb === "behavior-highlightscroll") {
					this.highlightscroll(behaviors[b].id);
				} else if (myb === "behavior-scroll") {
					this.doScroll(behaviors[b].id);
				}
			}
		}
	},

	removeAll: function () {
		for (var b in this.applied) {
			if((this.applied[b].id).length > 0){
				$("#" + this.applied[b].id).removeClass("highlightColor");
			}
		}
	},

	highlight:function(id) {
		$('#'+id).addClass('highlightColor');
	},

	highlightscroll:function(id) {
		this.doScroll(id);
		this.highlight(id);
	},

			this.scrolled = true;

			if (passScroller.length > 0) {
				passTop = $(passScroller).position().top + 2;
				scrollPos = $('#'+id).get(0).offsetTop - passTop - 20;
				$(passScroller).scrollTop(scrollPos);
			}
		}
	}

var scrp = {
    // Hash of loaded script libs for the item
    loadedLibs:{},
    
    // Synchronously load the js libraries specified by libs array
    loadScriptLibs:function (libs, callback) {

        var that = this;
        
    	var filterSrc = function(src) {
    		if (src.substring(0,6) == "public") {
    			return "/" + src;
    		} else {
    			return src;
    		}
    	}        
        
		var loadScript = function (el, data, key) {
			var script = document.createElement("script");
			script.type = "text/javascript";
			script[(window.opera ? "innerHTML" : "text")] = data;	
			// PG - 10/26/2016 - Fix Highcharts Error 16 (double loading)
			// The following line is not needed for Highcharts.  It causes 
			// the script library to be needlessly double-executed.
			// TNAV-35246: Prevent bootstrap-select from double loading.
			if (key !== 'highcharts' && key !== 'bootstrapselect' && key !== 'prepresponsetimer') el.appendChild(script);
		}	        
	        
		var head = document.getElementsByTagName("head")[0], script;        

        var loadLib = function (index) {
            var name = libs[index];
            
            // Skip reloading unless this is the ETS SimulationRuntime (which we must always reload).
            if (name.key in that.loadedLibs && (name.key != 'etssimruntime')) {
            	//console.log('Skipping library: ' + name.src);
				index++;
				if (index < libs.length) {
					loadLib(index);
				} else {
					callback();
				}      
            } else {
            	var liburl = filterSrc(name.src);
				//console.log('Loading library: ' + liburl);
				$.get(liburl, function (data) {
					that.loadedLibs[name.key] = liburl; // skip loading next time
					loadScript(head, data, name.key);
					index++;
					if (index < libs.length) {
						loadLib(index);
					} else {
						callback();
					}
				}).fail(function() {
					alert("Network Error Loading ScriptLib");
				});
            }
        }

		if (libs.length > 0) {
        	loadLib(0);
        } else {
        	callback();
        }
    }
};
function getResponsesForAnsweredness() {
	var results = [];
	if (typeof responseSchema === 'undefined') return results;
	for (var r in responseSchema) {
		var response = responseSchema[r];
		if (response.interactionType == 'ORDERINTERACTION') {
			var result = [],
				answered = null;
			if (response.subType == 'tei-order') {
				result = eval('getResponseData_' + response.identifier + '()');
				// TN8.13 - support for answer-on-move requires us to track interaction-level answeredness.
				answered = $('#interaction_' + response.identifier).orderInteraction('getAnswered');
			} else {
				var choices = $('#interaction_' + response.identifier + ' > li');
				for (var i=0; i<choices.length; i++) {
					result.push(choices.eq(i).attr('data-identifier') || choices[i].id);
				}
			}
			response.value = result;
			if (answered != null) response.answered = answered;
		} else if ((response.interactionType == 'HOTSPOTINTERACTION') ||
			(response.interactionType == 'GAPMATCHINTERACTION') ||
			(response.interactionType == 'GRAPHICGAPMATCHINTERACTION') ||
			(response.interactionType == 'MATCHINTERACTION') ||
			(response.interactionType == 'HOTSPOTINTERACTION') ||
			(response.interactionType == 'DRAWINGINTERACTION')) {
		    var result = eval('getResponseData_' + response.identifier + '()');
			response.value = result;
		} else if (response.interactionType == 'HOTTEXTINTERACTION') {
			var result = eval('getResponseData_' + response.identifier + '()');
			response.value = result.data;
		} else if (response.interactionType == 'POSITIONOBJECTINTERACTION') {
			var result = [], point;
			$('#interaction_choices_' + response.identifier + ' > div').each(function(index) {
				point = [$(this).data('pos').xpos, $(this).data('pos').ypos];
				result.push(point);
			});
			response.value = result;
		} else if ((response.interactionType == 'CUSTOMINTERACTION') ||
			(response.interactionType == 'CUSTOMINTERACTION-CHART')) {
			var isGraphing = false;
			var isPointGraph = false;
			var isFunctionGraph = false;
			var isFractionModel = false;
			var isZoomNumberLine = false;
			var isNumberLine = false;
			var isTextExtractor = false;
			var isTextHighlighter = false;
			var isComplexHotspot = false;
			var isShapeTransform = false;
			var isCompositeGraph = false;
			var isComplexSlider = false;
			var isEE = false;
			var isPCI = false;
			var isRichInline = false;
			var isAudioCapture = false;
			var isSbGrid = false;
			var isSbEE = false;
			var isSbTI = false;

			var result;
			response.value = '';

			if (response.hasOwnProperty('subType')) {
				if ((response.subType == 'tei-pointgraph-line') ||
					(response.subType == 'tei-pointgraph-polygon') ||
					(response.subType == 'tei-pointgraph-scatter')) {
					isPointGraph = true;
				} else if (response.subType == 'tei-functiongraph') {
					isFunctionGraph = true;
				} else if (response.subType == 'tei-zoomnumberline') {
					isZoomNumberLine = true;
				} else if (response.subType == 'tei-numberline') {
					isNumberLine = true;
				} else if (response.subType == 'tei-fractionmodel') {
					isFractionModel = true;
				} else if (response.subType == 'tei-textextractor') {
					isTextExtractor = true;
				} else if (response.subType == 'tei-texthighlighter') {
					isTextHighlighter = true;
				} else if (response.subType == 'tei-complexhotspot') {
					isComplexHotspot = true;
				} else if (response.subType == 'tei-graphing') {
					isGraphing = true;
				} else if (response.subType == 'tei-shapetransformation') {
					isShapeTransform = true;
				} else if (response.subType == 'tei-compositegraph') {
					isCompositeGraph = true;
				} else if (response.subType == 'tei-complexslider') {
					isComplexSlider = true;
				} else if (response.subType == 'tei-ee') {
					isEE = true;
				} else if (response.subType == "tei-pci") {
					isPCI = true;
				} else if (response.subType == "tei-richinline") {
					isRichInline = true;
				} else if (response.subType == "tei-audiocapture") {
					isAudioCapture = true;
				} else if (response.subType == "tei-sbgrid") {
					isSbGrid = true;
				} else if (response.subType == "tei-sbee") {
					isSbEE = true;
				} else if (response.subType == "tei-sbti") {
					isSbTI = true;
				}
			}

			if (isEE) {
				var ee = EquationEditorAPI.getInstance(response.identifier);
				response.value = (ee != null) ? ee.getResponseData() : {};
			} else if ((isPointGraph) || (isGraphing) || (isTextHighlighter) || (isTextExtractor) || (isFractionModel) || (isNumberLine) || (isZoomNumberLine) || (isFunctionGraph) || (isShapeTransform) || (isCompositeGraph) || (isComplexSlider)) {
				result = eval('getResponseData_' + response.identifier + '()');
				response.value = result.data;
			} else if ((isComplexHotspot) || (isRichInline)) {
				result = eval('getResponseData_' + response.identifier + '()');
				response.value = result;
			} else if (isAudioCapture) {
				result = eval("getResponseData_" + response.identifier + "()");
				if (result.hasOwnProperty("data")) {
					// v1 audio capture
					response.value = result.data;
				} else {
					// v2 audio capture
					response.value = TN8.AudioFileFactory.getAudio(response.identifier);
				}
			} else if (isSbEE || isSbGrid || isSbTI) {
				result = eval("getResponseData_" + response.identifier + "()");
				// These produce stringified XML in the data property
				response.value = result.data;

			} else if (isPCI) {
				var interaction = qtiCustomInteractionContext.getConfigurationByIdentifier(response.identifier);
				if (interaction != null) {
					var el = $('div[data-identifier="' + interaction.identifier + '"]');
					if (el.length > 0) {
						var includeAnswered = el.data( 'includeanswered' ) == true;
						var isPciIframed = el.data( 'pciIframed' ) == true;
						// For answeredness, only get the response if the PCI is include answered or not iFramed
						if (isPciIframed || !includeAnswered) {
							response.value = {};
						} else {
							result = interaction.getResponse();
							if (result.hasOwnProperty('answered')) {
								// it is an interaction
								response.value = result.data;
							} else {
								// it is a manipulative
								response.value = result;
							}
						}
					} else {
						response.value = {};
					}	
				} else {
					response.value = {};
				}
			}
		} else if (response.interactionType == 'CHOICEINTERACTION') {
			var result = [],
				el = $("ul[data-identifier='" + response.identifier + "_shadow']"),
					el2 = $.makeArray($('ul')).filter((inst) => $(inst).parent('[data-identifier="' + response.identifier + '"]').length > 0);
			response.value = [];
			if (el.length > 0 || el2.length > 0) {
				// new shadow choice interaction needs to be saved with getResponseData
				result = eval('getResponseData_' + response.identifier + '()');
				if (!Array.isArray(result)) {
					result = [];
				}
			} else {
				var choices = $('input[name=group_' + response.identifier + ']:checked'),
					i;
				for (i = 0; i < choices.length; i++)
					{ 
				    if (!$(choices[i]).attr("value")) {
						result.push($(choices[i]).attr("data-choice-value"));
					}
				   else { 
					    result.push($(choices[i]).attr("value")); 
					}
				}
			}
			if (Array.isArray(result)) {
				response.value = JSON.stringify(result);
			} else {
				response.value = result;
			}

			//Check for choice widget (right now need class="at-enable")
			if( $('div[data-identifier="' + response.identifier + '"]').hasClass('at-enable')) {
				if(!($('div[data-identifier="' + response.identifier + '"]').choiceMultipleTN8('getCalledAfterOrder') === true)) {
					$('div[data-identifier="' + response.identifier + '"]').choiceMultipleTN8('afterOrder');
				}
    			response.order = $('div[data-identifier="' + response.identifier + '"]').choiceMultipleTN8('getResponseOrder');
    		}
		} else if (response.interactionType == 'INLINECHOICEINTERACTION') {
			var result = [], choice = null, selector, val;
			response.value = [];
			selector = $("select[data-identifier='interaction_" + response.identifier + "']");
			if (selector.length > 0) {
				choice = $("select[data-identifier='interaction_" + response.identifier + "'] option").filter(':selected');
			} else {
				choice = $("select[data-identifier='" + response.identifier + "'] option").filter(':selected');
			}
			if (choice != null) {
				val = $(choice).attr('value');
				if (val != '') { result.push(val); }
			}
			response.value = result;
		} else if (response.interactionType == 'EXTENDEDTEXTINTERACTION') {
			var el = $('#interaction_' + response.identifier);
			if ($(el).hasClass('widget-extendedtext')) {
				response.value = $(el).extendedtextInteraction('saveState');
			}
		} else if (response.interactionType == 'TEXTENTRYINTERACTION') {
			// check old way
			var el = $('input[data-identifier="interaction_' + response.identifier + '"]');
			if (el.length > 0) {
				response.value = $(el).val();
			} else {
				// check new way
				el = $('input[data-identifier="' + response.identifier + '"]');
				if ($(el).data('module') == 'TextEntryGriddedResponse') {
					response.value = eval('getResponseData_' + response.identifier + '()');
				} else {
					response.value = $(el).val();
				}
			}
		} else {
			response.value = $('#interaction_' + response.identifier).val();
		}
		if(response.order) {
			results.push({
				identifier: response.identifier,
				value: response.value,
				order: response.order
			});
		} else {
			var o = {
				identifier: response.identifier,
				value: response.value
			};
			if (response.interactionType == 'ORDERINTERACTION' && response.hasOwnProperty('answered')) {
				o.answered = response.answered;
			}
			results.push(o);
		}
	}
	return results;
}

function responseFactory() {
	var myresponses = { responses : [] };
	var results, data, response;
	var first, i, d, json;
	for (var r in responseSchema) {
		var response = responseSchema[r];
		results = { identifier: response.identifier, baseType: response.baseType };
		d = null, json = null;		
		if (response.interactionType == "CHOICEINTERACTION") {
			var selector = $("ul[data-identifier='" + response.identifier + "_shadow']");
			first = true;
			d = "";
			if (selector.length > 0) {
				// new shadow choice interaction needs to be saved with getResponseData
				data = eval('getResponseData_' + response.identifier + '()');
				for (i=0; i<data.length; i++) {
					if (first) {
						d = data[i];
						first = false;
					} else {
				    	d += "," + data[i];
					}
				}				
			} else {			
				data = $("input[name=group_" + response.identifier + "]:checked");
				for (i=0; i<data.length; i++) {
					if (!$(data[i]).attr("value")) {
						if (first) {
							d = $(data[i]).attr("data-choice-value");
							first = false;
						} else {
						    d += "," + $(data[i]).attr("data-choice-value");
						}
					}else{
						if (first) {
							d = $(data[i]).attr("value");
							first = false;
						} else {
							d += "," + $(data[i]).attr("value");
						}
					}
				}				
			}
			results.value = d;
		} else if (response.interactionType == "INLINECHOICEINTERACTION") {
			// legacy inlineChoiceInteractions had an "interaction_" prefix on the data-identifier of the <select> 
			var selector = $("select[data-identifier='interaction_" + response.identifier + "']");
			if (selector.length > 0) {
				results.value = $(selector).val();
			} else {
				results.value = $("select[data-identifier='" + response.identifier + "']").val();
			}		
		} else if (response.interactionType == "ORDERINTERACTION") {
			if (response.subType == "tei-order") {
	    		data = eval("getResponseData_" + response.identifier + "()");
	    		d = data.join(",");
			} else {
				data = 	$("#interaction_" + response.identifier + " > li");
				first = true;
				d = "";
				for (i=0; i<data.length; i++) {
					if (first) {
						d = $(data[i]).attr("data-identifier");
						first = false;
					} else {
				    	d += "," + $(data[i]).attr("data-identifier");
					}
				}
			}
			results.value = d;
		} else if (response.interactionType == "POSITIONOBJECTINTERACTION") {
			var points = $("#interaction_choices_" + response.identifier + " > div");
			first = true;
			var point;
			for (i=0; i<points.length; i++) {
				point = $(points[i]).data('pos').xpos + " " + $(points[i]).data('pos').ypos
				if (first) {
					d = point
					first = false;
				} else {
			    	d += "," + point;
				}
			}
			results.value = d;
		} else if ((response.interactionType == "GAPMATCHINTERACTION") ||
			(response.interactionType == "GRAPHICGAPMATCHINTERACTION") ||
			(response.interactionType == "MATCHINTERACTION") || 
			(response.interactionType == "HOTSPOTINTERACTION")) {
	    	data = eval("getResponseData_" + response.identifier + "()");		
			first = true;
			d = "";
			for (i=0; i<data.length; i++) {
				if (first) {
					d = data[i];
					first = false;
				} else {
			    	d += "," + data[i];
				}
			}
			results.value = d;
		} else if (response.interactionType == "HOTTEXTINTERACTION") {
			result = eval("getResponseData_" + response.identifier + "()");
			json = JSON.stringify(result.data);
			if (json != null && (typeof json == 'string' || json instanceof String)) {
				d = escapeJson(json);
			}
			results.value = d;
		} else if ((response.interactionType == "CUSTOMINTERACTION") ||
			  	   (response.interactionType == "CUSTOMINTERACTION-CHART")) {
			var isGraphing = false;
			var isCompositeGraph = false;
			var isTextHighlighter = false;
			var isTextExtractor = false;
			var isComplexHotspot = false;
			var isShapeTransform = false;
			var isFunctionGraph = false;
			var isFractionModel = false;
			var isZoomNumberLine = false;
			var isNumberLine = false;
			var isComplexSlider = false;
			var isEE = false;
			var isPCI = false;
			var isRichInline = false;
			var isAudioCapture = false;
			var isSbGrid = false;
			var isSbEE = false;
			var isSbTI = false;

			if (response.hasOwnProperty("subType")) {
				if ((response.subType == "tei-pointgraph-line") ||
					(response.subType == "tei-pointgraph-polygon") ||
					(response.subType == "tei-pointgraph-scatter") ||
					(response.subType == "tei-graphing")) {
					isGraphing = true;
				} else if (response.subType == "tei-compositegraph") {
					isCompositeGraph = true;
				} else if (response.subType == "tei-texthighlighter") {
					isTextHighlighter = true;
				} else if (response.subType == "tei-textextractor") {
					isTextExtractor = true;
				} else if (response.subType == "tei-complexhotspot") {
					isComplexHotspot = true;
				} else if (response.subType == "tei-shapetransformation") {
					isShapeTransform = true;
				} else if (response.subType == "tei-complexslider") {
					isComplexSlider = true;	
				} else if (response.subType == "tei-functiongraph") {
					isFunctionGraph = true;						
				} else if (response.subType == "tei-fractionmodel") {
					isFractionModel = true;						
				} else if (response.subType == "tei-numberline") {
					isNumberLine = true;						
				} else if (response.subType == "tei-zoomnumberline") {
					isZoomNumberLine = true;						
				} else if (response.subType == "tei-ee") {
					isEE = true;
				} else if (response.subType == "tei-pci" || response.subType == "tei-timer") {
					isPCI = true;
				} else if (response.subType == "tei-richinline") {
					isRichInline = true;
				} else if (response.subType == "tei-audiocapture") {
					isAudioCapture = true;
				} else if (response.subType == "tei-sbgrid") {
					isSbGrid = true;
				} else if (response.subType == "tei-sbee") {
					isSbEE = true;
				} else if (response.subType == "tei-sbti") {
					isSbTI = true;
				}
			}
			
			if (isGraphing || isCompositeGraph || isTextHighlighter || isTextExtractor || isShapeTransform
					|| isFunctionGraph || isFractionModel || isNumberLine || isZoomNumberLine || isEE) {
				result = eval("getResponseData_" + response.identifier + "()");
				json = JSON.stringify(result.data);
			} else if ((isComplexHotspot) || (isRichInline)) {
				data = eval("getResponseData_" + response.identifier + "()");
				first = true;
				if (data.length == 0) {
					d = "";
				} else {
					for (i=0; i<data.length; i++) {
						if (first) {
							d = data[i];
							first = false;
						} else {
					    	d += "," + data[i];
						}
					}
				}			
			} else if (isComplexSlider) {
				result = eval("getResponseData_" + response.identifier + "()");
				d = result.data;

			} else if (isAudioCapture) {
				result = eval("getResponseData_" + response.identifier + "()");
				if (result.hasOwnProperty("data")) {
					// v1 audio capture
					d = result.data;
				} else {
					// v2 audio capture
					result = TN8.AudioFileFactory.getAudio(response.identifier)
					d = result.data;
				}
			} else if (isSbEE || isSbGrid || isSbTI) {
				result = eval("getResponseData_" + response.identifier + "()");
				// These produce stringified XML in the data property
				d = JSON.stringify(result.data);
			} else if (isPCI) {
				var interaction = qtiCustomInteractionContext.getConfigurationByIdentifier(response.identifier);
				if (interaction != null) {
					var el = $('div[data-identifier="' + response.identifier + '"]');
					if (el.length > 0) {
						var isPciIframed = el.data( 'pciIframed' ) == true;
						if (isPciIframed) {
							// get response from QTI_PCI_Platform
							result = JSON.stringify( QTI_PCI_Platform.interactionResponses[response.identifier] );
						} else {
							result = interaction.getResponse();
						}
						if (typeof result == "string") {
							d = result;
						} else {
							json = JSON.stringify(result);
						}
					} else {
						// what is it?
						json = JSON.stringify({});					
					}
				} else {
					// what is it?
					json = JSON.stringify({});
				}
			}
			
			if (json != null && (typeof json == 'string' || json instanceof String)) {
				d = escapeJson(json);
			}
			
			results.value = d;
		} else if (response.interactionType == "DRAWINGINTERACTION") {
			result = eval("getResponseData_" + response.identifier + "()");
			results.value = result;
		} else if (response.interactionType == "") {
			results = null;
		} else {
			results.value = $("#interaction_" + response.identifier).val();
		}
		if (results != null) {
			myresponses.responses.push(results);
		}
	}
	return myresponses;
}

function escapeJson(json) {
	var escapedJson = json;
	if (json != null && (typeof json == 'string' || json instanceof String)) {
		escapedJson = escapedJson.replace(/"/g, "\\\"");
		escapedJson = "\"" + escapedJson + "\"";
	}
	return escapedJson;
}

function escapeXml(xml) {
    return xml.replace(/[<>&'"\\]/g, function (c) {
        switch (c) {
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '&': return '&amp;';
            case '\'': return '&apos;';
            case '\\': return '\\\\';
            case '"': return '&quot;';
        }
    });
}

function unescapeXml(xml) {
    return xml.replace(/(&lt;|&gt;|&amp;|&apos;|\\\\|&quot;)/g, function (c) {
        switch (c) {
            case '&lt;': return '<';
            case '&gt;': return '>';
            case '&amp;': return '&';
            case '&apos;': return '\'';
            case '\\\\': return '\\';
            case '&quot;': return '"';
        }
    });
}

function escapeResponseXml(xml) {
	var ixStartResp = xml.indexOf("<response>");
	if (ixStartResp < 0) ixStartResp = xml.indexOf("<responseSpec>");
	if (ixStartResp < 0) ixStartResp = xml.indexOf("<?xml ");
	while (ixStartResp >= 0) {
		var ixEndResp = xml.indexOf("</response>", ixStartResp);
		if (ixEndResp < 0) ixEndResp = xml.indexOf("</responseSpec>", ixStartResp);
		if (ixEndResp < 0) ixEndResp = xml.indexOf("</AnswerSet>", ixStartResp);
		if (ixEndResp > 0) {
			ixEndResp += 11;
			var respStr = xml.substring(ixStartResp, ixEndResp);
			var escRespStr = escapeXml(respStr);
			xml = xml.substring(0, ixStartResp) + escRespStr + xml.substring(ixEndResp);
			ixStartResp = xml.indexOf("<response>", ixStartResp + escRespStr.length);
			if (ixStartResp < 0) ixStartResp = xml.indexOf("<responseSpec>", ixStartResp + escRespStr.length);
			if (ixStartResp < 0) ixStartResp = xml.indexOf("<?xml ", ixStartResp + escRespStr.length);
		} else ixStartResp = -1; // unmatched <response> / <responseSpec>: error
	}
	
	return xml;
}

    console.log('binding api window event');
    element.addEventListener(eventName, eventHandler, false);
  } else if (element.attachEvent) {
    // For IE8 and older IE
    element.attachEvent('on' + eventName, eventHandler);
  }
}
